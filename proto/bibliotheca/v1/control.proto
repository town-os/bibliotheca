syntax = "proto3";

package bibliotheca.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// =====================================================================
// bibliotheca.v1 — control plane for the Bibliotheca object storage daemon.
//
// All RPCs here are intended to be served on a local Unix domain socket.
// There is no network-exposed authentication on this surface; access is
// gated by filesystem permissions on the socket itself. End-user data
// access is handled by the data-plane interface crates (HTTP, S3, etc.).
// =====================================================================

// ---------- Identity ----------

message User {
  string id = 1;          // ULID/UUID
  string name = 2;        // unique login name
  string display_name = 3;
  repeated string group_ids = 4;
  google.protobuf.Timestamp created_at = 5;
  bool disabled = 6;
}

message Group {
  string id = 1;
  string name = 2;
  string description = 3;
  google.protobuf.Timestamp created_at = 4;
}

// ---------- ACLs ----------

enum Permission {
  PERMISSION_UNSPECIFIED = 0;
  PERMISSION_READ = 1;
  PERMISSION_WRITE = 2;
  PERMISSION_LIST = 3;
  PERMISSION_DELETE = 4;
  PERMISSION_ADMIN = 5; // implies all others + ACL management
}

enum PrincipalKind {
  PRINCIPAL_KIND_UNSPECIFIED = 0;
  PRINCIPAL_KIND_USER = 1;
  PRINCIPAL_KIND_GROUP = 2;
  PRINCIPAL_KIND_PUBLIC = 3; // anonymous via opt-in HTTP
}

message AclEntry {
  PrincipalKind principal_kind = 1;
  string principal_id = 2; // empty for PUBLIC
  repeated Permission permissions = 3;
}

message Acl {
  repeated AclEntry entries = 1;
}

// ---------- Subvolumes ----------

message Subvolume {
  string id = 1;
  string name = 2;            // path-safe
  string owner_user_id = 3;
  string mount_path = 4;      // host filesystem mount of the subvolume
  uint64 quota_bytes = 5;     // 0 = unlimited
  Acl acl = 6;
  google.protobuf.Timestamp created_at = 7;
}

message Snapshot {
  string id = 1;
  string subvolume_id = 2;
  string name = 3;
  string mount_path = 4;
  bool readonly = 5;
  google.protobuf.Timestamp created_at = 6;
}

// ---------- Interfaces (data-plane protocols) ----------

enum InterfaceKind {
  INTERFACE_KIND_UNSPECIFIED = 0;
  INTERFACE_KIND_HTTP = 1;       // authenticated HTTP — opt-in by default
  INTERFACE_KIND_S3 = 2;
  INTERFACE_KIND_SOLID = 3;
  INTERFACE_KIND_DROPBOX = 4;
  INTERFACE_KIND_NEXTCLOUD = 5;
  INTERFACE_KIND_GCS = 6;
  INTERFACE_KIND_ICLOUD = 7;
  INTERFACE_KIND_IPFS = 8;
}

message InterfaceConfig {
  InterfaceKind kind = 1;
  bool enabled = 2;     // false by default for HTTP
  string listen = 3;    // e.g. 127.0.0.1:8443, [::1]:9000, /run/bibliotheca/s3.sock
  bool tls = 4;
  string tls_cert_path = 5;
  string tls_key_path = 6;
  // free-form per-interface config; interface crates own validation.
  map<string, string> options = 7;
}

// =====================================================================
// Service surface
// =====================================================================

service Identity {
  rpc CreateUser(CreateUserRequest) returns (User);
  rpc GetUser(GetUserRequest) returns (User);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty);
  rpc SetUserPassword(SetUserPasswordRequest) returns (google.protobuf.Empty);

  rpc CreateGroup(CreateGroupRequest) returns (Group);
  rpc GetGroup(GetGroupRequest) returns (Group);
  rpc ListGroups(ListGroupsRequest) returns (ListGroupsResponse);
  rpc DeleteGroup(DeleteGroupRequest) returns (google.protobuf.Empty);
  rpc AddUserToGroup(AddUserToGroupRequest) returns (google.protobuf.Empty);
  rpc RemoveUserFromGroup(RemoveUserFromGroupRequest) returns (google.protobuf.Empty);
}

message CreateUserRequest {
  string name = 1;
  string display_name = 2;
  string password = 3; // hashed server-side
}
message GetUserRequest { string id_or_name = 1; }
message ListUsersRequest { uint32 limit = 1; uint32 offset = 2; }
message ListUsersResponse { repeated User users = 1; }
message DeleteUserRequest { string id = 1; }
message SetUserPasswordRequest { string id = 1; string password = 2; }

message CreateGroupRequest { string name = 1; string description = 2; }
message GetGroupRequest { string id_or_name = 1; }
message ListGroupsRequest { uint32 limit = 1; uint32 offset = 2; }
message ListGroupsResponse { repeated Group groups = 1; }
message DeleteGroupRequest { string id = 1; }
message AddUserToGroupRequest { string user_id = 1; string group_id = 2; }
message RemoveUserFromGroupRequest { string user_id = 1; string group_id = 2; }

service Storage {
  rpc CreateSubvolume(CreateSubvolumeRequest) returns (Subvolume);
  rpc GetSubvolume(GetSubvolumeRequest) returns (Subvolume);
  rpc ListSubvolumes(ListSubvolumesRequest) returns (ListSubvolumesResponse);
  rpc DeleteSubvolume(DeleteSubvolumeRequest) returns (google.protobuf.Empty);
  rpc SetQuota(SetQuotaRequest) returns (Subvolume);

  rpc SetAcl(SetAclRequest) returns (Subvolume);
  rpc GetAcl(GetAclRequest) returns (Acl);

  rpc CreateSnapshot(CreateSnapshotRequest) returns (Snapshot);
  rpc ListSnapshots(ListSnapshotsRequest) returns (ListSnapshotsResponse);
  rpc DeleteSnapshot(DeleteSnapshotRequest) returns (google.protobuf.Empty);
}

message CreateSubvolumeRequest {
  string name = 1;
  string owner_user_id = 2;
  uint64 quota_bytes = 3;
  Acl acl = 4;
}
message GetSubvolumeRequest { string id_or_name = 1; }
message ListSubvolumesRequest {
  string owner_user_id = 1; // optional filter
  uint32 limit = 2;
  uint32 offset = 3;
}
message ListSubvolumesResponse { repeated Subvolume subvolumes = 1; }
message DeleteSubvolumeRequest { string id = 1; bool force = 2; }
message SetQuotaRequest { string id = 1; uint64 quota_bytes = 2; }
message SetAclRequest { string subvolume_id = 1; Acl acl = 2; }
message GetAclRequest { string subvolume_id = 1; }
message CreateSnapshotRequest { string subvolume_id = 1; string name = 2; bool readonly = 3; }
message ListSnapshotsRequest { string subvolume_id = 1; }
message ListSnapshotsResponse { repeated Snapshot snapshots = 1; }
message DeleteSnapshotRequest { string id = 1; }

service Interfaces {
  rpc Get(GetInterfaceRequest) returns (InterfaceConfig);
  rpc List(google.protobuf.Empty) returns (ListInterfacesResponse);
  rpc Configure(InterfaceConfig) returns (InterfaceConfig);
  rpc Enable(EnableInterfaceRequest) returns (InterfaceConfig);
  rpc Disable(DisableInterfaceRequest) returns (InterfaceConfig);
}

message GetInterfaceRequest { InterfaceKind kind = 1; }
message ListInterfacesResponse { repeated InterfaceConfig interfaces = 1; }
message EnableInterfaceRequest { InterfaceKind kind = 1; }
message DisableInterfaceRequest { InterfaceKind kind = 1; }

// IPFS ingest is exposed as a control-plane RPC because it crosses
// subvolume boundaries (pinning content into a target subvolume).
service Ipfs {
  rpc Pin(PinRequest) returns (PinResponse);
  rpc Unpin(UnpinRequest) returns (google.protobuf.Empty);
  rpc Import(ImportRequest) returns (ImportResponse);
  rpc Export(ExportRequest) returns (ExportResponse);
  rpc ListPins(ListPinsRequest) returns (ListPinsResponse);
}

message PinRequest {
  string cid = 1;
  string subvolume_id = 2; // destination subvolume
  bool recursive = 3;
}
message PinResponse { string cid = 1; uint64 size_bytes = 2; }
message UnpinRequest { string cid = 1; }
message ImportRequest {
  string subvolume_id = 1;
  string source_path = 2; // path inside the subvolume
}
message ImportResponse { string cid = 1; }
message ExportRequest {
  string cid = 1;
  string subvolume_id = 2;
  string dest_path = 3;
}
message ExportResponse { uint64 bytes_written = 1; }
message ListPinsRequest { string subvolume_id = 1; }
message ListPinsResponse { repeated PinResponse pins = 1; }

// =====================================================================
// SyncAdmin — manages client-side sync mounts that pull (and
// eventually push) content from remote services (iCloud, Dropbox,
// Google Photos, Solid, Nextcloud/WebDAV, IPFS) into local
// subvolumes procured from the town-os systemcontroller.
//
// Credentials travel over this socket only; they are encrypted at
// rest with the daemon's master key. The gRPC client (bibliothecactl)
// is expected to read them from files or stdin rather than accept
// them on the command line.
// =====================================================================

enum SyncConnectorKind {
  SYNC_CONNECTOR_UNSPECIFIED = 0;
  SYNC_CONNECTOR_ICLOUD_PHOTOS = 1;
  SYNC_CONNECTOR_DROPBOX = 2;
  SYNC_CONNECTOR_NEXTCLOUD = 3;
  SYNC_CONNECTOR_SOLID = 4;
  SYNC_CONNECTOR_GOOGLE_PHOTOS = 5;
  SYNC_CONNECTOR_IPFS = 6;
}

enum SyncDirection {
  SYNC_DIRECTION_UNSPECIFIED = 0;
  SYNC_DIRECTION_PULL = 1;
  SYNC_DIRECTION_PUSH = 2;
  SYNC_DIRECTION_BOTH = 3;
}

message SyncMount {
  string id = 1;
  string name = 2;
  SyncConnectorKind kind = 3;
  string subvolume_id = 4;
  string townos_name = 5;
  SyncDirection direction = 6;
  uint32 interval_secs = 7;
  uint64 quota_bytes = 8;
  bool enabled = 9;
  bool paused = 10;
  google.protobuf.Timestamp last_sync_at = 11;
  string last_error = 12;
  google.protobuf.Timestamp created_at = 13;
  map<string, string> config = 14;
}

// Credential variants. Exactly one must be set on CreateMount.

message OAuth2Credentials {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_at = 3;
  string client_id = 4;
  string client_secret = 5;
  string token_url = 6;
}

message BasicCredentials {
  string username = 1;
  string password = 2;
}

message TokenCredentials {
  string token = 1;
  string refresh_token = 2;
  int64 expires_at = 3;
}

message ICloudCredentials {
  string apple_id = 1;
  string password = 2;
  string anisette_url = 3;
}

message IpfsCredentials {
  string api_url = 1;
  string auth_header = 2;
}

message CreateMountRequest {
  string name = 1;
  SyncConnectorKind kind = 2;
  SyncDirection direction = 3;
  uint64 quota_bytes = 4;      // 0 → use daemon default
  uint32 interval_secs = 5;
  string owner_user_id = 6;
  map<string, string> config = 7;

  oneof credentials {
    OAuth2Credentials oauth2 = 10;
    BasicCredentials basic = 11;
    TokenCredentials token = 12;
    ICloudCredentials icloud = 13;
    IpfsCredentials ipfs = 14;
  }
}

message UpdateMountRequest {
  string id = 1;
  optional uint32 interval_secs = 2;
  optional SyncDirection direction = 3;
  optional uint64 quota_bytes = 4;
}

message DeleteMountRequest { string id = 1; }
message MountIdRequest { string id = 1; }
message GetMountRequest { string id_or_name = 1; }
message ListMountsResponse { repeated SyncMount mounts = 1; }
message SubmitTwoFactorCodeRequest { string id = 1; string code = 2; }
message RotateSecretKeyRequest { string new_hex_key = 1; }

message TailEventsRequest {
  string mount_id = 1;
  int64 since_unix = 2;
}

message SyncEvent {
  string mount_id = 1;
  google.protobuf.Timestamp ts = 2;
  string level = 3;
  string kind = 4;
  string message = 5;
  map<string, string> details = 6;
}

// =====================================================================
// AnisetteAdmin — surfaces the bibliotheca-anisette proxy that runs
// alongside the daemon for operators who point sync-icloud mounts at
// a local endpoint. The proxy forwards to operator-controlled
// upstream anisette servers (typically peer bibliotheca nodes
// reachable over a VPN); this RPC only exposes introspection +
// cache reset, never upstream-credential material.
// =====================================================================

message AnisetteStatus {
  bool enabled = 1;
  string kind = 2;                       // "proxy" | "mock"
  repeated AnisetteUpstreamHealth upstreams = 3;
  int64 last_success_at = 4;
  int64 cached_until = 5;
  string listen = 6;
}

message AnisetteUpstreamHealth {
  string url = 1;
  uint64 ok_count = 2;
  uint64 err_count = 3;
  string last_error = 4;
}

service AnisetteAdmin {
  rpc Status(google.protobuf.Empty) returns (AnisetteStatus);
  rpc Reset(google.protobuf.Empty) returns (google.protobuf.Empty);
}

service SyncAdmin {
  rpc CreateMount(CreateMountRequest) returns (SyncMount);
  rpc ListMounts(google.protobuf.Empty) returns (ListMountsResponse);
  rpc GetMount(GetMountRequest) returns (SyncMount);
  rpc UpdateMount(UpdateMountRequest) returns (SyncMount);
  rpc DeleteMount(DeleteMountRequest) returns (google.protobuf.Empty);
  rpc Pause(MountIdRequest) returns (SyncMount);
  rpc Resume(MountIdRequest) returns (SyncMount);
  rpc TriggerSync(MountIdRequest) returns (google.protobuf.Empty);
  rpc SubmitTwoFactorCode(SubmitTwoFactorCodeRequest) returns (google.protobuf.Empty);
  rpc TailEvents(TailEventsRequest) returns (stream SyncEvent);
  rpc RotateSecretKey(RotateSecretKeyRequest) returns (google.protobuf.Empty);
}
